name: Selenium Tests

on:
  push:
  workflow_dispatch:

permissions:
  checks: write
  contents: read
  issues: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Chrome and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable fonts-liberation libxss1

      - name: Run Tests
        run: mvn test
        continue-on-error: true

      - name: Upload Test Reports and Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-and-screenshots
          path: |
            test-output/
            target/surefire-reports/
          retention-days: 30

      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: target/surefire-reports/TEST-*.xml
          check_name: Selenium Test Results
